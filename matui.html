<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material UI</title>

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mui/material@latest/dist/material.min.css">
    
 
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 30px;
            background-color: lightgray;
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        button {
            background-color: lightseagreen;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }

        .mui-appbar {
            margin-top: -30px;
            background-color: sandybrown;
        }

        .mui-card {
            padding: 20px;
            max-width: 350px;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            background-color: white;
        }

        .material-icons {
            font-size: 30px;
            margin-left: 20px;
            cursor: pointer;
        }

        .mui-textfield {
            margin-top: 10px;
            margin-bottom: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: #fff;
        }

        .mui-checkbox, .mui-radio {
            margin-top: 10px;
        }

        .mui-snackbar {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .mui-snackbar.mui--is-visible {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    
    <button onclick="toggleDarkMode()" class="mui-button mui-button--contained">cick for Dark Mode</button>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

    <br><br>
    <h1 style="text-align: center; font-size: 36px;">Welcome</h1>

    
    <nav class="mui-appbar mui--appbar-dark">
        <table width="100%">
            <tr style="vertical-align:middle;">
                <td align="right">
                    <button class="mui-button mui-button--text">Home</button>
                    <button class="mui-button mui-button--text">About</button>
                    <button class="mui-button mui-button--text">Contact</button>
                </td>
            </tr>
        </table>
    </nav>

    
    <div style="text-align: center;">
        <button class="mui-button mui-button--contained">Contained Button</button>
        <button class="mui-button mui-button--outlined">Outlined Button</button>
        <button class="mui-button mui-button--text">Text Button</button>
    </div>

    
    <div class="mui-card" style="margin: 20px auto;">
        <h3>MUI Card</h3>
        <p>HI..!</p>
    </div>

  
    <div style="text-align: center;">
        <span class="material-icons">home</span>
        <span class="material-icons">person</span>
        <span class="material-icons">settings</span>
    </div>

    <br><br>
    <h3>Simple Form</h3>
    <form style="max-width: 400px; margin: auto;">
        <label class="mui-form-label">Full Name:</label>
        <input type="text" class="mui-textfield" placeholder="Enter your full name"><br><br>

        <label class="mui-form-label">Email:</label>
        <input type="email" class="mui-textfield" placeholder="Enter your email"><br><br>

        <label>
            <input type="checkbox" class="mui-checkbox"> I accept the terms and conditions
        </label><br><br>

        <label>
            <input type="radio" name="gender" class="mui-radio"> Male
        </label>
        <label>
            <input type="radio" name="gender" class="mui-radio"> Female
        </label><br>
    </form>

    <br><br>
    <div id="snackbar" class="mui-snackbar">Snackbar message!</div>

    
    <div style="text-align: center;">
        <button onclick="showSnackbar()" class="mui-button mui-button--contained">Show Snackbar</button>
    </div>

    <script>
        function showSnackbar() {
            var snackbar = document.getElementById("snackbar");
            snackbar.classList.add("mui--is-visible");
            setTimeout(() => {
                snackbar.classList.remove("mui--is-visible");
            }, 3000);
        }
    </script>
</body>
</html>
